<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クレーム初期対応ボット | デモ</title>
<style>
  :root {
    --navy:   #1A2B4A;
    --blue:   #3A7BD5;
    --orange: #F5A623;
    --red:    #ef4444;
    --green:  #22c55e;
    --yellow: #f59e0b;
    --bg:     #F0F4F8;
    --white:  #fff;
    --border: #D8E3F0;
    --muted:  #6B7A99;
    --bot-color: #1A2B4A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Maru Gothic ProN','Yu Gothic',sans-serif; background: var(--bg); color: var(--navy); height: 100vh; display: flex; flex-direction: column; }

  /* ─── HEADER ─── */
  .header { background: var(--navy); color: #fff; padding: 0.8rem 1.2rem; display: flex; align-items: center; gap: 0.8rem; flex-shrink: 0; }
  .header-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg,#3A7BD5,#5b9cf6); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
  .header-info h1 { font-size: 0.92rem; font-weight: 700; }
  .header-info p  { font-size: 0.7rem; color: rgba(255,255,255,.6); margin-top: 1px; }
  .header-level { margin-left: auto; text-align: right; }
  .level-label { font-size: 0.62rem; color: rgba(255,255,255,.5); }
  .level-badge { font-size: 0.72rem; font-weight: 700; padding: 0.25rem 0.7rem; border-radius: 999px; margin-top: 2px; display: inline-block; }
  .level-1 { background: #dcfce7; color: #15803d; }
  .level-2 { background: #fef3c7; color: #92400e; }
  .level-3 { background: #fee2e2; color: #991b1b; }
  .demo-notice { background: #FFF7E0; border-bottom: 2px solid var(--orange); text-align: center; font-size: 0.72rem; color: #7a5000; padding: 0.35rem; flex-shrink: 0; }

  /* ─── BODY LAYOUT ─── */
  .body { display: flex; flex: 1; overflow: hidden; }

  /* ─── CHAT ─── */
  .chat-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat-area { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.9rem; }
  .msg { display: flex; gap: 0.6rem; max-width: 86%; animation: fadeIn .2s ease; }
  .msg.bot  { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
  .msg-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; margin-top: 2px; }
  .msg.bot  .msg-avatar { background: linear-gradient(135deg,var(--navy),var(--blue)); }
  .msg.user .msg-avatar { background: linear-gradient(135deg,#64748b,#94a3b8); }
  .msg-bubble { padding: 0.7rem 0.95rem; border-radius: 16px; font-size: 0.85rem; line-height: 1.75; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .msg.bot  .msg-bubble { background: var(--white); border-radius: 4px 16px 16px 16px; }
  .msg.user .msg-bubble { background: #3A7BD5; color: #fff; border-radius: 16px 4px 16px 16px; }
  .msg-bubble b { color: var(--blue); }
  .msg.user .msg-bubble b { color: #b3d4ff; }
  .typing { display: flex; gap: 4px; padding: 0.5rem 0.6rem; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce .9s infinite; }
  .typing span:nth-child(2){animation-delay:.15s}
  .typing span:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

  /* ─── QUICK REPLIES ─── */
  .quick-wrap { padding: 0.6rem 1rem; display: flex; flex-wrap: wrap; gap: 0.5rem; flex-shrink: 0; }
  .quick-btn { background: var(--white); border: 1.5px solid var(--blue); color: var(--blue); font-size: 0.78rem; padding: 0.4rem 0.9rem; border-radius: 999px; cursor: pointer; font-family: inherit; transition: all .15s; }
  .quick-btn:hover { background: var(--blue); color: #fff; }
  .quick-btn:disabled { opacity: .4; pointer-events: none; }

  /* ─── INPUT ─── */
  .input-area { background: var(--white); border-top: 1px solid var(--border); padding: 0.75rem 1rem; display: flex; gap: 0.6rem; flex-shrink: 0; }
  .input-area input { flex: 1; border: 1.5px solid var(--border); border-radius: 999px; padding: 0.55rem 1rem; font-size: 0.85rem; font-family: inherit; outline: none; transition: border-color .2s; }
  .input-area input:focus { border-color: var(--blue); }
  .send-btn { background: var(--blue); color: #fff; border: none; border-radius: 50%; width: 38px; height: 38px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .2s; }
  .send-btn:hover { background: #2a5fb5; }

  /* ─── RECORD PANEL ─── */
  .record-col { width: 260px; flex-shrink: 0; background: var(--white); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .record-header { background: var(--navy); color: #fff; padding: 0.75rem 1rem; font-size: 0.8rem; font-weight: 700; }
  .record-body { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.8rem; }
  .rec-field { }
  .rec-label { font-size: 0.65rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 0.2rem; }
  .rec-value { font-size: 0.8rem; color: var(--navy); font-weight: 600; padding: 0.4rem 0.6rem; background: var(--bg); border-radius: 6px; min-height: 28px; transition: all .3s; }
  .rec-value.filled { background: #EEF6FF; border-left: 3px solid var(--blue); }
  .rec-value.urgent { background: #FFF1F1; border-left: 3px solid var(--red); color: var(--red); }
  .escalate-box { background: var(--red); color: #fff; border-radius: 10px; padding: 0.9rem; text-align: center; font-size: 0.8rem; display: none; }
  .escalate-box.show { display: block; animation: fadeIn .4s ease; }
  .escalate-box b { display: block; font-size: 1rem; margin-bottom: 0.3rem; }
  .record-footer { padding: 0.8rem; border-top: 1px solid var(--border); flex-shrink: 0; }
  .reset-btn { width: 100%; padding: 0.5rem; background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.78rem; cursor: pointer; font-family: inherit; color: var(--muted); transition: all .15s; }
  .reset-btn:hover { background: var(--border); }

  @media (max-width: 600px) { .record-col { display: none; } }
</style>
</head>
<body>

<div class="header">
  <div class="header-avatar">🛡️</div>
  <div class="header-info">
    <h1>クレーム初期対応ボット</h1>
    <p>〇〇スーパー（デモ）— お客様サポート窓口</p>
  </div>
  <div class="header-level">
    <div class="level-label">対応レベル</div>
    <div class="level-badge level-1" id="levelBadge">● 通常</div>
  </div>
</div>
<div class="demo-notice">※ デモ用サンプルです。実際の導入時は自社の対応フローに合わせてカスタマイズします。</div>

<div class="body">
  <!-- チャット -->
  <div class="chat-col">
    <div class="chat-area" id="chatArea"></div>
    <div class="quick-wrap" id="quickWrap"></div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="ご意見・ご不満をお気軽にお書きください">
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>

  <!-- 対応記録パネル -->
  <div class="record-col">
    <div class="record-header">📋 対応記録（自動入力）</div>
    <div class="record-body">
      <div class="rec-field"><div class="rec-label">受付日時</div><div class="rec-value filled" id="rec-time"></div></div>
      <div class="rec-field"><div class="rec-label">クレーム種別</div><div class="rec-value" id="rec-type">—</div></div>
      <div class="rec-field"><div class="rec-label">対象商品 / 部門</div><div class="rec-value" id="rec-product">—</div></div>
      <div class="rec-field"><div class="rec-label">購入日時</div><div class="rec-value" id="rec-date">—</div></div>
      <div class="rec-field"><div class="rec-label">状況詳細</div><div class="rec-value" id="rec-detail">—</div></div>
      <div class="rec-field"><div class="rec-label">優先度</div><div class="rec-value" id="rec-priority">—</div></div>
      <div class="escalate-box" id="escalateBox">
        <b>🚨 担当者へ引き継ぎ</b>
        チーフ・副店長に通知済み<br>
        <small style="opacity:.8">対応記録を転送しました</small>
      </div>
    </div>
    <div class="record-footer">
      <button class="reset-btn" onclick="resetDemo()">🔄 最初からやり直す</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  状態管理
// ══════════════════════════════════════════
let state = 'init';
let record = {};
let isTyping = false;

const chatArea  = document.getElementById('chatArea');
const quickWrap = document.getElementById('quickWrap');
const userInput = document.getElementById('userInput');

// ══════════════════════════════════════════
//  フロー定義
// ══════════════════════════════════════════
const FLOWS = {
  // 異物混入
  foreign: {
    level: 3,
    type: '異物混入',
    priority: '🔴 最優先対応',
    steps: [
      { bot: `大変申し訳ございません。<b>異物混入</b>のご報告を受けました。\n\nお客様・ご家族のご体調は大丈夫でしょうか？まず健康状態をお知らせください。`, quick:['体調に問題ない','体調が悪い・病院に行った'] },
      { bot: `ご確認いただきありがとうございます。\n商品と異物は<b>現在お手元にありますか？</b>写真がございましたら後ほどご提出いただけますと助かります。`, quick:['商品・異物あり','捨ててしまった'], recKey:'detail', recVal:'異物混入の申告あり' },
      { bot: `承知いたしました。ご不快をおかけしまして誠に申し訳ございません。\n\nただいま<b>担当チーフ・副店長に連絡</b>しております。5分以内に責任者よりご連絡させていただきます。\n\nご連絡先のお電話番号をお教えいただけますか？`, quick:null, escalate: true },
    ]
  },
  // 品質不良
  quality: {
    level: 2,
    type: '商品品質',
    priority: '🟡 要対応',
    steps: [
      { bot: `ご不便をおかけして申し訳ございません。\n<b>どのような商品</b>にご不満がございましたか？（例：お弁当、刺身、野菜など）`, quick:['お弁当・惣菜','鮮魚・刺身','野菜・果物','その他の食品'] },
      { bot: `ありがとうございます。\nご購入はいつ頃でしたか？<b>レシートや購入日時</b>をご確認いただけますか？`, quick:['今日購入','昨日購入','数日前'], recKey:'type', recVal:'品質不良' },
      { bot: `承知いたしました。ご状況を確認させていただきます。\n\n商品の<b>返金または交換</b>を承ることが可能です。お手数ですがレシートをお持ちの上、サービスカウンターまでお越しいただけますか？`, quick:['返金を希望','交換を希望','また連絡します'], recKey:'detail', recVal:'返金/交換対応へ' },
    ]
  },
  // 接客クレーム
  staff: {
    level: 2,
    type: '接客対応',
    priority: '🟡 要対応',
    steps: [
      { bot: `大変失礼いたしました。スタッフの対応でご不快をおかけして誠に申し訳ございません。\n\n差し支えなければ、<b>どの売場・どのような対応</b>だったかお聞かせいただけますか？`, quick:['レジでの対応','売場スタッフの対応','電話での対応'] },
      { bot: `ご状況をお知らせいただきありがとうございます。\nご不快な思いをさせてしまい、重ねてお詫び申し上げます。\n\n<b>発生した日時</b>をお教えいただけますか？`, quick:['今日','昨日','数日前'], recKey:'type', recVal:'接客クレーム' },
      { bot: `承知いたしました。このたびのご意見を担当責任者へ報告し、<b>スタッフの指導・改善</b>に活かしてまいります。\n\n改めて副店長よりご連絡差し上げることも可能です。ご希望はありますか？`, quick:['連絡を希望する','連絡は不要'], recKey:'detail', recVal:'接客クレーム — 上長報告要', escalate: true },
    ]
  },
  // 価格・レジ
  price: {
    level: 1,
    type: '価格・精算',
    priority: '🟢 通常対応',
    steps: [
      { bot: `ご不明な点がございましたか？\n<b>どのような内容</b>についてでしょうか？`, quick:['値段が違う（値札と違う）','レジで二重請求された','ポイントが付かなかった'] },
      { bot: `ご確認いただきありがとうございます。\n<b>レシートはお手元にありますか？</b>確認のためにお教えください。`, quick:['レシートあり','レシートなし'], recKey:'type', recVal:'価格・精算トラブル' },
      { bot: `承知いたしました。サービスカウンターにてご対応させていただきます。\n\nレシートをお持ちの場合は差額の<b>返金または再精算</b>が可能です。レシートがない場合もできる限り確認いたします。\n\nサービスカウンターは入口すぐ左にございます。`, quick:['今から行く','後日行く'], recKey:'detail', recVal:'サービスカウンターへ誘導' },
    ]
  },
};

// ──────────────────────────────────────────
//  起動時メッセージ＋最初の選択
// ──────────────────────────────────────────
const INITIAL_QUICK = [
  { label:'🚨 異物が入っていた',  key:'foreign' },
  { label:'🤢 品質が悪かった',    key:'quality' },
  { label:'😤 スタッフの対応が悪かった', key:'staff' },
  { label:'💰 値段・レジについて', key:'price'   },
];

let currentFlow = null;
let flowStep    = 0;

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('rec-time').textContent = new Date().toLocaleString('ja-JP');
  addBotMsg(`いらっしゃいませ。\nこちらは<b>〇〇スーパー（デモ） お客様サポート窓口</b>です。\n\nご不満・ご意見をお聞かせください。以下からお選びいただくか、自由にお書きください。`);
  renderInitQuick();
  userInput.addEventListener('keydown', e => { if (e.key==='Enter') sendMsg(); });
});

// ══════════════════════════════════════════
//  送信処理
// ══════════════════════════════════════════
function sendMsg() {
  const text = userInput.value.trim();
  if (!text || isTyping) return;
  userInput.value = '';
  handleInput(text);
}

function handleInput(text) {
  addUserMsg(text);
  clearQuick();

  if (!currentFlow) {
    const t = text;
    let key = null;
    if (/異物|虫|髪の毛|ガラス|石|金属/.test(t))       key = 'foreign';
    else if (/品質|腐|臭|味|古|消費期限|ぬるい/.test(t)) key = 'quality';
    else if (/態度|接客|無視|失礼|スタッフ|店員/.test(t)) key = 'staff';
    else if (/値段|価格|レジ|ポイント|請求|高い/.test(t)) key = 'price';
    if (key) { startFlow(key); return; }
    showTyping(`ご連絡いただきありがとうございます。\nお手数ですが、以下からご状況に近いものをお選びください。`);
    setTimeout(renderInitQuick, 900);
    return;
  }

  // フロー進行
  advanceFlow(text);
}

function startFlow(key) {
  currentFlow = FLOWS[key];
  flowStep = 0;
  updateLevel(currentFlow.level);
  setRecord('rec-type', currentFlow.type, 'filled');
  setRecord('rec-priority', currentFlow.priority, currentFlow.level===3?'urgent':'filled');
  showTyping(currentFlow.steps[0].bot, () => renderStepQuick(0));
}

function advanceFlow(text) {
  const step = currentFlow.steps[flowStep];
  if (step.recKey) setRecord(`rec-${step.recKey === 'type' ? 'type' : step.recKey === 'detail' ? 'detail' : step.recKey}`, text, 'filled');

  flowStep++;
  if (flowStep >= currentFlow.steps.length) {
    // 最後のステップ後
    showTyping(`ご対応の記録が完了しました。\nスタッフが速やかに対応いたします。本日はご連絡いただきありがとうございました。`);
    return;
  }

  const next = currentFlow.steps[flowStep];
  if (next.recKey) setRecord(`rec-${next.recKey}`, next.recVal || text, 'filled');
  if (next.escalate) triggerEscalate();
  showTyping(next.bot, () => {
    if (next.quick) renderStepQuick(flowStep);
  });
}

// ══════════════════════════════════════════
//  クイックリプライ
// ══════════════════════════════════════════
function renderInitQuick() {
  quickWrap.innerHTML = INITIAL_QUICK.map(q =>
    `<button class="quick-btn" onclick="selectFlow('${q.label.replace(/'/g,"\\'")}','${q.key}')">${q.label}</button>`
  ).join('');
}

function selectFlow(label, key) {
  if (isTyping || currentFlow) return;
  addUserMsg(label);
  clearQuick();
  startFlow(key);
}

function renderStepQuick(stepIdx) {
  const qs = currentFlow?.steps[stepIdx]?.quick;
  if (!qs) { clearQuick(); return; }
  quickWrap.innerHTML = qs.map(q =>
    `<button class="quick-btn" onclick="advanceStep('${q.replace(/'/g,"\\'")}'">${q}</button>`
  ).join('');
}

function advanceStep(text) {
  isTyping = false;
  addUserMsg(text);
  clearQuick();
  advanceFlow(text);
}

function clearQuick() { quickWrap.innerHTML = ''; }

// ══════════════════════════════════════════
//  対応記録更新
// ══════════════════════════════════════════
function setRecord(id, val, cls='') {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = val;
  el.className = 'rec-value ' + cls;
}

function updateLevel(lv) {
  const badge = document.getElementById('levelBadge');
  const labels = ['','● 通常','⚠ 要対応','🚨 緊急対応'];
  const cls = ['','level-1','level-2','level-3'];
  badge.textContent = labels[lv];
  badge.className = `level-badge ${cls[lv]}`;
}

function triggerEscalate() {
  setRecord('rec-detail', '担当者へ引き継ぎ済み', 'urgent');
  setTimeout(()=>{
    document.getElementById('escalateBox').classList.add('show');
  }, 800);
}

// ══════════════════════════════════════════
//  UI描画
// ══════════════════════════════════════════
function addBotMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg bot';
  el.innerHTML = `<div class="msg-avatar">🛡️</div><div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>`;
  chatArea.appendChild(el);
  scrollBottom();
}
function addUserMsg(text) {
  const el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = `<div class="msg-bubble">${escHtml(text)}</div><div class="msg-avatar">👤</div>`;
  chatArea.appendChild(el);
  scrollBottom();
}
function showTyping(answer, cb) {
  isTyping = true;
  const el = document.createElement('div');
  el.className = 'msg bot'; el.id = 'typing';
  el.innerHTML = `<div class="msg-avatar">🛡️</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatArea.appendChild(el);
  scrollBottom();
  const delay = 600 + Math.min(answer.length * 5, 800);
  setTimeout(() => {
    el.remove();
    addBotMsg(answer);
    isTyping = false;
    if (cb) cb();
  }, delay);
}
function scrollBottom() { chatArea.scrollTop = chatArea.scrollHeight; }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ══════════════════════════════════════════
//  リセット
// ══════════════════════════════════════════
function resetDemo() {
  currentFlow = null; flowStep = 0; isTyping = false;
  chatArea.innerHTML = '';
  clearQuick();
  ['rec-type','rec-product','rec-date','rec-detail','rec-priority'].forEach(id => {
    const el = document.getElementById(id);
    if(el){el.textContent='—';el.className='rec-value';}
  });
  document.getElementById('escalateBox').classList.remove('show');
  updateLevel(1);
  document.getElementById('rec-time').textContent = new Date().toLocaleString('ja-JP');
  addBotMsg(`いらっしゃいませ。\nこちらは<b>〇〇スーパー（デモ） お客様サポート窓口</b>です。\n\nご不満・ご意見をお聞かせください。以下からお選びいただくか、自由にお書きください。`);
  renderInitQuick();
}
</script>
</body>
</html>
